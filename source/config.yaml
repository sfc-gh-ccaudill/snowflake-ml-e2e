snowflake:
  connection_name: DEMO # Change to your connection name
  database: ML_DEMO_PIPELINE_DB
  schema: HEALTHCARE
  warehouse: ML_DEMO_WAREHOUSE

compute:
  compute_pool: ML_DEMO_COMPUTE_POOL
  instance_family: CPU_X64_S
  min_nodes: 1
  max_nodes: 3

model:
  model_name: PATIENT_RISK_MODEL
  target_platforms:
    - SNOWPARK_CONTAINER_SERVICES
    - WAREHOUSE

tables:
  raw_data: RAW_PATIENT_DATA

feature_config:
  raw_numeric_features:
    - AGE
    - BMI
    - HEART_RATE
    - SYSTOLIC_BP
    - DIASTOLIC_BP
    - TEMPERATURE
    - RESPIRATORY_RATE
    - OXYGEN_SATURATION
    - GLUCOSE_LEVEL
    - CREATININE
    - HEMOGLOBIN
    - WBC_COUNT
    - COMORBIDITY_COUNT
    - PREVIOUS_ADMISSIONS
    - MEDICATION_COUNT
  categorical_features:
    - GENDER
    - PRIMARY_DIAGNOSIS
    - ADMISSION_TYPE
    - INSURANCE_TYPE
  computed_features:
    - SHOCK_INDEX
    - PULSE_PRESSURE
    - BMI_CATEGORY
    - VITAL_SIGNS_SEVERITY
  target_column: RISK_LEVEL
  class_labels:
    - LOW
    - MEDIUM
    - HIGH
    - CRITICAL
